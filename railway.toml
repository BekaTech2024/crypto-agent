# Guide de déploiement — Agent Crypto Berkan

## Architecture complète

```
CoinGecko (prix gratuits)
        ↓
  Agent Python (serveur Railway)
        ↓
  Claude Sonnet 4.6 (analyse IA)
        ↓
  Binance API (exécution trades)
        ↓
  Telegram Bot (contrôle depuis téléphone)
```

---

## Étape 1 — Clés API nécessaires

### Binance
1. Allez sur https://www.binance.com/fr/my/settings/api-management
2. Créez une clé API
3. Activez seulement "Enable Spot & Margin Trading"
4. Notez `API Key` et `Secret Key`

### Anthropic (Claude)
1. https://console.anthropic.com/settings/keys
2. Créez une nouvelle clé API
3. Notez la clé (commence par `sk-ant-...`)

### Telegram Bot
1. Ouvrez Telegram → cherchez `@BotFather`
2. Tapez `/newbot` → donnez un nom → notez le TOKEN
3. Cherchez `@userinfobot` → notez votre CHAT_ID

---

## Étape 2 — Déploiement sur Railway (gratuit)

1. Créez un compte sur https://railway.app
2. Cliquez "New Project" → "Deploy from GitHub"
3. Uploadez ce dossier sur GitHub d'abord, ou utilisez Railway CLI:

```bash
npm install -g @railway/cli
railway login
railway init
railway up
```

### Variables d'environnement sur Railway
Dans votre projet Railway → Variables → ajoutez:

```
ANTHROPIC_API_KEY    = sk-ant-...
BINANCE_API_KEY      = votre_clé_binance
BINANCE_SECRET_KEY   = votre_secret_binance
TELEGRAM_TOKEN       = votre_token_bot
TELEGRAM_CHAT_ID     = votre_chat_id
```

---

## Étape 3 — Test en simulation

Dans `agent/trading_agent.py`, ligne RISK:
```python
"simulation_mode": True,   # ← garder True pour tester
```

L'agent tourne mais n'exécute AUCUN vrai trade.
Vérifiez que vous recevez les rapports sur Telegram.

---

## Étape 4 — Passer en mode réel

Quand vous êtes satisfait des résultats en simulation (minimum 2 semaines):
```python
"simulation_mode": False,  # ← passer à False
```

⚠️ Commencez avec un petit montant (200-500€ max).

---

## Commandes Telegram disponibles

| Commande | Action |
|----------|--------|
| /start   | Panneau de contrôle principal |
| /stop    | Met l'agent en pause |
| /go      | Relance l'agent |

Via les boutons du panneau:
- 📊 **Statut** — voir l'état actuel
- ⏸ **Pause** — stopper tous les trades
- ▶️ **Reprendre** — relancer
- 🔄 **Forcer analyse** — déclencher un cycle maintenant
- ⚙️ **Paramètres risque** — changer le niveau de risque
- 📈 **Portfolio** — voir votre portefeuille

---

## Prochaine étape — App Android

L'app Android se connectera à une API REST qu'on ajoutera
au serveur Railway. Elle affichera:
- Dashboard portfolio en temps réel
- Historique des trades
- Contrôle de l'agent (pause/play/paramètres)
- Notifications push à chaque trade

Stack prévue: React Native (fonctionne iOS + Android)
